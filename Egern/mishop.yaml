name: "小米商城签到"
description: "小米商城获取cookie+签到"
author: "MaYIHEI"
icon: "https://raw.githubusercontent.com/MaYIHEI/pin/refs/heads/main/app/mishop.png"

compat_arguments:
  token_disabled: false
  cron: "15 8 * * *"

compat_arguments_schema:
  token_disabled:
    name: "禁用获取token"
    description: "禁用后关闭抓包获取token功能"
    options:
    - true
    - false
    default_value: false
  cron:
    name: "执行时间"
    description: "自定义任务执行时间"
    default_value: "15 8 * * *"

dns: {}
scriptings:
- http_request:
    name: "小米商城 Cookie"
    match: "^https:\\/\\/shop-api\\.retail\\.mi\\.com\\/mtop\\/mf\\/act\\/infinite\\/(do|done)"
    script_url: "https://raw.githubusercontent.com/MaYIHEI/paperclip/refs/heads/main/app/mishop/mishop.cookie.js"
    max_size: 0
    disabled: {{{token_disabled}}}
- schedule:
    name: "小米商城签到"
    cron: {{{cron}}}
    script_url: "https://raw.githubusercontent.com/MaYIHEI/paperclip/refs/heads/main/app/mishop/mishop.js"
    timeout: 60
mitm:
  hostnames:
    includes:
      - shop-api.retail.mi.com

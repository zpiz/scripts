name: "同程旅行"
description: "同程旅行签到抽奖"
author: "chavyleung"
icon: "https://raw.githubusercontent.com/zpiz/icons/main/icons/tclx.png"

compat_arguments:
  token_disabled: false
  cron: "15 8 * * *"

compat_arguments_schema:
  token_disabled:
    name: "禁用获取token"
    description: "禁用后关闭抓包获取token功能"
    options:
    - true
    - false
    default_value: false
  cron:
    name: "执行时间"
    description: "自定义任务执行时间"
    default_value: "15 8 * * *"
    
dns: {}
scriptings:
- http_request:
    name: 同程cookie
    match: ^https:\/\/app\.17u\.cn\/welfarecenter\/index\/signIndex
    script_url: https://raw.githubusercontent.com/chavyleung/scripts/master/tongcheng-trip/tongcheng-trip.js
    max_size: 0
    body_required: true
    disabled: {{{token_disabled}}}
- schedule:
    name: 同程旅行任务
    cron: {{{cron}}}
    script_url: https://raw.githubusercontent.com/chavyleung/scripts/master/tongcheng-trip/tongcheng-trip.js
    timeout: 2400
mitm:
  hostnames:
    includes:
    - app.17u.cn

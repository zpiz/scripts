name: PT-rousi脚本
description: 登录获取ck，定时签到
icon: https://github.com/zpiz/icons/blob/cc178cca6d9628a7b90a037f8f3618bb4922c0a4/icons/cfmoto.png
dns: {}
scriptings:
- http_response:
    name: rousipro
    match: ^https:\/\/rousi\.pro\/api\/(me|points\/init|points\/balance|points\/attendance\/stats)
    script_url: https://raw.githubusercontent.com/zpiz/scripts/refs/heads/main/Quantumultx/rousipro.js
    max_size: -1
    timeout: 60
    body_required: true
- schedule:
    name: rousi签到
    cron: 13 10 * * *
    script_url: https://raw.githubusercontent.com/zpiz/scripts/refs/heads/main/Quantumultx/rousipro.js
    update_interval: 86400
    timeout: 3600    
mitm:
  hostnames:
    includes:
    - rousi.pro

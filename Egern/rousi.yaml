name: "PT-rousi脚本"
description: "登录获取 ck，定时签到；获取 ck 和定时任务均可单独关闭"
icon: "https://github.com/zpiz/icons/blob/cc178cca6d9628a7b90a037f8f3618bb4922c0a4/icons/cfmoto.png"

compat_arguments:
  token_url: "^https:\\/\\/rousi\\.pro\\/api\\/(me|points\\/init|points\\/balance|points\\/attendance\\/stats)"
  cron: false

compat_arguments_desc: |-
  token_url: 获取 ck 的 URL 模式。
  cron: 定时签到开关，false 为开启，true 为关闭。

dns: {}

scriptings:
  - http_response:
      name: "rousipro 获取 ck"
      match: {{{token_url}}}
      script_url: "https://raw.githubusercontent.com/zpiz/scripts/refs/heads/main/Quantumultx/rousipro.js"
      max_size: -1
      timeout: 60
      body_required: true
  - schedule:
      name: "rousi 签到"
      cron: {{{cron}}}
      script_url: "https://raw.githubusercontent.com/zpiz/scripts/refs/heads/main/Quantumultx/rousipro.js"
      update_interval: 86400
      timeout: 3600

mitm:
  hostnames:
    includes:
      - rousi.pro

name: "PT-rousi脚本"
description: "登录获取 ck，定时签到；获取 ck 和定时任务均可单独关闭"
icon: "https://github.com/zpiz/icons/blob/cc178cca6d9628a7b90a037f8f3618bb4922c0a4/icons/cfmoto.png"

compat_arguments:
  token_disabled: false
  cron: "11 10 * * *"

compat_arguments_schema:
  token_enabled:
    name: "禁用获取token"
    description: "禁用后关闭抓包获取token功能"
    options:
    - true
    - false
    default_value: false
  cron:
    name: "执行时间"
    description: "自定义任务执行时间"
    default_value: "11 10 * * *"
dns: {}

scriptings:
  - http_response:
      name: "rousi获取ck"
      match: "^https:\\/\\/rousi\\.pro\\/api\\/(me|points\\/init|points\\/balance|points\\/attendance\\/stats)"
      script_url: "https://raw.githubusercontent.com/zpiz/scripts/refs/heads/main/Quantumultx/rousipro.js"
      max_size: -1
      timeout: 60
      body_required: true
      disabled: {{{token_enabled}}}
  - schedule:
      name: "rousi签到"
      cron: {{{cron}}}
      script_url: "https://raw.githubusercontent.com/zpiz/scripts/refs/heads/main/Quantumultx/rousipro.js"
      update_interval: 86400
      timeout: 3600

mitm:
  hostnames:
    includes:
      - rousi.pro

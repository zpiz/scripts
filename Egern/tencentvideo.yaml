name: "腾讯视频签到"
description: "腾讯视频获取cookie+签到"
author: "WowYiJiu Modifier: MaYIHEI"
icon: "https://raw.githubusercontent.com/MaYIHEI/pin/refs/heads/main/app/tenvideo.png"

compat_arguments:
  token_disabled: false
  cron: "11 10 * * *"

compat_arguments_schema:
  token_disabled:
    name: "禁用获取token"
    description: "禁用后关闭抓包获取token功能"
    options:
    - true
    - false
    default_value: false
  cron:
    name: "执行时间"
    description: "自定义任务执行时间"
    default_value: "11 10 * * *"

dns: {}
scriptings:
- http_request:
    name: "腾讯视频 Cookie"
    match: "^https:\\/\\/pbaccess\\.video\\.qq\\.com\\/"
    script_url: "https://raw.githubusercontent.com/MaYIHEI/paperclip/refs/heads/main/app/tenvideo/tenvideo.js"
    max_size: 0
    disabled: {{{token_disabled}}}
- schedule:
    name: "腾讯视频签到"
    cron: {{{cron}}}
    script_url: "https://raw.githubusercontent.com/MaYIHEI/paperclip/refs/heads/main/app/tenvideo/tenvideo.js"
    timeout: 60
mitm:
  hostnames:
    includes:
      - pbaccess.video.qq.com
      - vip.video.qq.com
